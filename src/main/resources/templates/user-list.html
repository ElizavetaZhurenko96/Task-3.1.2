<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- @thymesVar id="user" type="com.model.User" -->
<head>
    <meta charset="UTF-8">
    <title>Users</title>
</head>
<body>
<h1>Users</h1>

<a th:href="@{/admin/new/}">Add New User</a>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Age</th>
        <th>Password</th>
        <th>Authority</th>
        <th>Actions</th>
    </tr>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.name}"></td>
        <td th:text="${user.email}"></td>
        <td th:text="${user.age}"></td>
        <td th:text="${user.password}"></td>
        <td>
  <span th:each="role, iterStat : ${user.roles}">
    <span th:text="${role.authority}"></span><span th:if="${!iterStat.last}">, </span>
  </span>
        </td>
        <td>
            <form th:action="@{'/admin/update/' + ${user.id}}" method="get" style="display:inline;">
                <button type="submit">Edit</button>
            </form>
            <form th:action="@{'/admin/delete/' + ${user.id}}" method="post" th:object="${user}" style="display:inline;">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
</table>
<a th:href="@{/logout}">Logout</a>
</body>
</html>

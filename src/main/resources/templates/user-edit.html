<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- @thymesVar id="user" type="com.model.User" -->
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
</head>
<body>
<h1>Edit User</h1>

<form th:action="@{'/update/{id}/' + ${user.id}}" th:object="${user}" method="post">
    <input type="hidden" th:field="*{id}"/>
    <label>Name: <input type="text" th:field="*{name}"/></label><br>
    <label>Email: <input type="email" th:field="*{email}"/></label><br>
    <label>Age: <input type="number" th:field="*{age}"/></label><br>
    <label>Password: <input type="password" th:field="*{password}"/></label><br>

    <label>Roles:
        <select name="roles" multiple="multiple">
            <option th:each="role : ${allRoles}"
                    th:value="${role.name}"
                    th:text="${role.name}"
                    th:selected="${user.roles.contains(role)}">
            </option>
        </select>
    </label><br>

    <button type="submit">Update</button>
</form>

<a th:href="@{/admin}">Back to List</a>
</body>
</html>

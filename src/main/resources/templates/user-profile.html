<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Info</title>
</head>
<body>
<h1>User Profile</h1>

<p><strong>Name:</strong> <span th:text="${user.name}"></span></p>
<p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
<p><strong>Age:</strong> <span th:text="${user.age}"></span></p>
<p><strong>Password</strong> <span th:text="${user.password}"></span></p>
<p><strong>Roles:</strong> <span th:each="role : ${user.roles}" th:text="${role.roleType} + ' '"></span></p>

<a th:href="@{/logout}">Logout</a>
</body>
</html>
